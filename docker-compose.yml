services:
  backend:
    build:
      context: ./backend
    container_name: jaca_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENV=${BACKEND_ENV}
      - HOST=${BACKEND_HOST}
      - PORT=${BACKEND_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: jaca_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
